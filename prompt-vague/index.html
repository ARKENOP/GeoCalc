<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GéoCalc — Calculateur de géométrie interactif. Calculez aires, périmètres, volumes et surfaces pour toutes les formes géométriques 2D et 3D.">
    <title>GéoCalc — Calculateur de Géométrie</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background orbs -->
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>

    <div class="app-container">
        <!-- Header -->
        <header class="header" id="header">
            <h1 class="logo">
                <span class="logo-icon">
                    <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                        <polygon points="20,2 38,32 2,32" stroke="url(#logoGrad)" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
                        <circle cx="20" cy="22" r="8" stroke="url(#logoGrad2)" stroke-width="2" fill="none"/>
                        <defs>
                            <linearGradient id="logoGrad" x1="0" y1="0" x2="40" y2="40">
                                <stop offset="0%" stop-color="#6366f1"/>
                                <stop offset="100%" stop-color="#06b6d4"/>
                            </linearGradient>
                            <linearGradient id="logoGrad2" x1="0" y1="0" x2="40" y2="40">
                                <stop offset="0%" stop-color="#8b5cf6"/>
                                <stop offset="100%" stop-color="#10b981"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </span>
                <span class="logo-text">GéoCalc</span>
            </h1>
            <p class="subtitle">Calculateur de géométrie interactif — Aires, périmètres, volumes & plus</p>
        </header>

        <!-- Category Toggle -->
        <div class="category-toggle" id="categoryToggle">
            <button class="toggle-btn active" data-category="2d" id="toggle2d">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
                Formes 2D
            </button>
            <button class="toggle-btn" data-category="3d" id="toggle3d">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                Formes 3D
            </button>
        </div>

        <!-- Shapes Grid -->
        <div class="shapes-grid" id="shapesGrid">
            <!-- Populated by JS -->
        </div>

        <!-- Calculator Panel -->
        <div class="calculator-panel" id="calculatorPanel">
            <div class="calc-header">
                <div class="shape-preview" id="shapePreview">
                    <!-- SVG preview rendered by JS -->
                </div>
                <h2 class="calc-title" id="calcTitle">Sélectionnez une forme</h2>
                <p class="calc-description" id="calcDescription"></p>
            </div>

            <div class="inputs-group" id="inputsGroup">
                <!-- Inputs populated by JS -->
            </div>

            <button class="calc-button" id="calcButton" disabled>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                Calculer
            </button>

            <div class="results-grid" id="resultsGrid">
                <!-- Results populated by JS -->
            </div>

            <div class="formula-section" id="formulaSection">
                <!-- Formulas populated by JS -->
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>GéoCalc © 2026 — Calculs géométriques précis et instantanés</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
