<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="GeoCalc — Calculateur géométrique en ligne. Calculez facilement le périmètre et l'aire de formes géométriques.">
  <title>GeoCalc — Calculateur Géométrique</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Decorative background orbs -->
  <div class="bg-orb bg-orb--1" aria-hidden="true"></div>
  <div class="bg-orb bg-orb--2" aria-hidden="true"></div>
  <div class="bg-orb bg-orb--3" aria-hidden="true"></div>

  <main class="app">
    <!-- Header -->
    <header class="header">
      <div class="header__icon" aria-hidden="true">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="6" y="6" width="36" height="36" rx="4" stroke="currentColor" stroke-width="2.5" stroke-dasharray="6 4"/>
          <circle cx="24" cy="24" r="12" stroke="currentColor" stroke-width="2.5"/>
          <polygon points="24,10 36,34 12,34" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
        </svg>
      </div>
      <h1 class="header__title">GeoCalc</h1>
      <p class="header__subtitle">Calculateur Géométrique</p>
    </header>

    <!-- Calculator Card -->
    <section class="card" aria-label="Formulaire de calcul">
      <!-- Shape Selector -->
      <div class="form-group">
        <label for="shape-select" class="form-label">Forme géométrique</label>
        <div class="select-wrapper">
          <select id="shape-select" class="select">
            <option value="">— Choisir une forme —</option>
            <option value="carre">Carré</option>
            <option value="rectangle">Rectangle</option>
            <option value="cercle">Cercle</option>
            <option value="triangle">Triangle</option>
          </select>
          <span class="select-arrow" aria-hidden="true">
            <svg width="12" height="8" viewBox="0 0 12 8" fill="none"><path d="M1 1.5L6 6.5L11 1.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
        </div>
      </div>

      <!-- Dynamic Input Fields -->
      <div id="inputs-container" class="inputs-container"></div>

      <!-- Calculate Button -->
      <button id="btn-calculate" class="btn" disabled>
        <span class="btn__text">Calculer</span>
        <span class="btn__icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </span>
      </button>
    </section>

    <!-- Results Card -->
    <section id="results-card" class="card card--results hidden" aria-label="Résultats" aria-live="polite">
      <h2 class="results__title">Résultats</h2>
      <div class="results__shape-badge" id="results-badge"></div>
      <div class="results__grid" id="results-grid"></div>
    </section>

    <!-- History Card -->
    <section id="history-card" class="card card--history hidden" aria-label="Historique des calculs">
      <div class="history__header">
        <h2 class="history__title">Calculs récents</h2>
        <button id="btn-clear-history" class="btn-clear" title="Effacer l'historique">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
        </button>
      </div>
      <div id="history-list" class="history__list"></div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <p>&copy; 2026 GeoCalc &mdash; Tous droits réservés</p>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
